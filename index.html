<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento PLADETUR — Municipalidad de El Quisco</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>

  :root{
    --azul:#0A5A9C; --azul-osc:#063E6E; --celeste:#2FA6DA;
    --dorado:#E0B84A; --verde:#2E9E5B; --ambar:#E0A22F; --rojo:#CF4A3C;
    --tinta:#22303C; --gris:#5A6B78; --linea:#E2E8EE;
    --fondo:#EEF2F6; --sup:#FFFFFF; --sup2:#F6F9FB;
    --sombra:0 1px 3px rgba(8,40,70,.08), 0 1px 2px rgba(8,40,70,.06);
    --radio:12px;
    --font:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--fondo);color:var(--tinta);font-family:var(--font);font-size:15px;line-height:1.5}
  button{font-family:var(--font);cursor:pointer}
  h1,h2,h3{margin:0;font-weight:600;color:var(--azul-osc)}

  /* ---------- Header ---------- */
  header{background:var(--sup);border-bottom:3px solid var(--azul);box-shadow:var(--sombra)}
  .head-in{max-width:1180px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .logo{height:46px;width:auto}
  .titulos{flex:1;min-width:230px}
  .titulos h1{font-size:19px;line-height:1.15}
  .titulos p{margin:2px 0 0;color:var(--gris);font-size:12.5px;letter-spacing:.02em}
  .head-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .periodo{display:flex;align-items:center;gap:6px;background:var(--sup2);border:1px solid var(--linea);border-radius:10px;padding:6px 10px}
  .periodo label{font-size:12px;color:var(--gris)}
  .periodo select{border:1px solid var(--linea);border-radius:7px;padding:4px 6px;font-family:var(--font);font-size:13px;background:#fff;color:var(--tinta)}
  .btn{border:1px solid var(--linea);background:#fff;color:var(--azul);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--sup2)}
  .btn-azul{background:var(--azul);color:#fff;border-color:var(--azul)}
  .btn-azul:hover{background:var(--azul-osc)}
  .actualizado{font-size:11.5px;color:var(--gris);width:100%;text-align:right}

  /* ---------- Nav ---------- */
  nav{background:var(--azul-osc)}
  .nav-in{max-width:1180px;margin:0 auto;padding:0 24px;display:flex;gap:4px}
  .tab{background:none;border:none;color:#cfe2f1;padding:13px 18px;font-size:14px;font-weight:600;border-bottom:3px solid transparent}
  .tab:hover{color:#fff}
  .tab.activo{color:#fff;border-bottom-color:var(--dorado)}

  /* ---------- Layout ---------- */
  main{max-width:1180px;margin:0 auto;padding:24px}
  .vista{display:none;animation:fade .25s ease}
  .vista.activa{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .card{background:var(--sup);border:1px solid var(--linea);border-radius:var(--radio);box-shadow:var(--sombra)}
  .grid{display:grid;gap:18px}
  .g-hero{grid-template-columns:300px 1fr}
  .g-2{grid-template-columns:1fr 1fr}
  @media(max-width:820px){.g-hero,.g-2{grid-template-columns:1fr}}

  .sec-tit{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--celeste);margin:0 0 14px}

  /* ---------- Donut ---------- */
  .hero{padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .hero .donut-num{font-size:40px;font-weight:700;color:var(--azul-osc);line-height:1}
  .hero .donut-lbl{font-size:12px;color:var(--gris);margin-top:2px}
  .hero h3{margin-top:14px;font-size:15px}

  .sem-row{display:flex;gap:10px;margin-top:16px;width:100%}
  .sem-box{flex:1;border-radius:10px;padding:10px 6px;text-align:center;color:#fff}
  .sem-box b{display:block;font-size:22px;line-height:1}
  .sem-box span{font-size:11px;opacity:.95}
  .sem-alto{background:var(--verde)} .sem-medio{background:var(--ambar)} .sem-bajo{background:var(--rojo)}

  /* ---------- Barras ---------- */
  .bar-item{margin-bottom:13px}
  .bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
  .bar-top .nm{color:var(--tinta);font-weight:500;padding-right:10px}
  .bar-top .vl{color:var(--gris);font-variant-numeric:tabular-nums;font-weight:600}
  .bar-track{height:11px;background:var(--sup2);border:1px solid var(--linea);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:5px;transition:width .5s ease}

  /* ---------- Presupuesto ---------- */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--linea)}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--gris)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tfoot td{font-weight:700;border-top:2px solid var(--azul);border-bottom:none}
  .pres-input{width:120px;border:1px solid var(--linea);border-radius:7px;padding:5px 7px;text-align:right;font-family:var(--font);font-size:13px}

  /* ---------- Registro ---------- */
  .eje-h{display:flex;align-items:center;gap:12px;margin:26px 0 12px;cursor:pointer;user-select:none}
  .eje-h:first-child{margin-top:6px}
  .eje-pill{background:var(--azul);color:#fff;font-weight:700;font-size:13px;border-radius:8px;padding:5px 11px;white-space:nowrap}
  .eje-h h2{font-size:16px;flex:1}
  .eje-h .eje-pct{font-size:13px;font-weight:700;color:var(--gris);font-variant-numeric:tabular-nums}
  .eje-chev{color:var(--gris);transition:transform .2s}
  .eje-h.cerrado .eje-chev{transform:rotate(-90deg)}
  .eje-body.oculto{display:none}

  .ficha{padding:16px 18px;margin-bottom:12px}
  .ficha-top{display:flex;align-items:flex-start;gap:12px}
  .dot{width:13px;height:13px;border-radius:50%;margin-top:4px;flex-shrink:0}
  .d-alto{background:var(--verde)} .d-medio{background:var(--ambar)} .d-bajo{background:var(--rojo)}
  .ficha-id{font-weight:700;color:var(--azul);font-size:13px}
  .ficha-linea{font-weight:600;font-size:14.5px;margin:1px 0 4px}
  .ficha-meta{font-size:12px;color:var(--gris);display:flex;flex-wrap:wrap;gap:4px 14px}
  .badge{display:inline-block;background:var(--sup2);border:1px solid var(--linea);border-radius:20px;padding:1px 9px;font-size:11.5px;color:var(--azul-osc)}
  .badge-pl{background:#eaf4fb;border-color:#cfe6f6;color:var(--azul)}
  .ficha-pct{margin-left:auto;text-align:right;flex-shrink:0}
  .ficha-pct b{font-size:22px;color:var(--azul-osc);font-variant-numeric:tabular-nums}
  .ficha-pct span{display:block;font-size:10.5px;color:var(--gris)}

  .acts{margin-top:12px;border-top:1px dashed var(--linea);padding-top:10px}
  .act{display:flex;align-items:center;gap:10px;padding:6px 4px;border-radius:8px}
  .act:hover{background:var(--sup2)}
  .act input[type=checkbox]{width:18px;height:18px;accent-color:var(--azul);cursor:pointer;flex-shrink:0}
  .act label{flex:1;cursor:pointer;font-size:13.5px}
  .act.done label{color:var(--gris);text-decoration:line-through}
  .act .del{border:none;background:none;color:#b9c4cd;font-size:16px;padding:2px 6px;border-radius:6px}
  .act .del:hover{color:var(--rojo);background:#fbeceb}
  .add-act{display:flex;gap:8px;margin-top:8px}
  .add-act input{flex:1;border:1px solid var(--linea);border-radius:8px;padding:7px 10px;font-family:var(--font);font-size:13px}
  .add-act button{border:1px dashed var(--azul);background:#fff;color:var(--azul);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600}

  /* ---------- Reporte ---------- */
  .rep-head{display:flex;align-items:center;gap:18px;padding:22px 24px;border-bottom:2px solid var(--azul)}
  .rep-head img{height:54px}
  .rep-head .rt h2{font-size:20px}
  .rep-head .rt p{margin:3px 0 0;color:var(--gris);font-size:13px}
  .rep-kpi{display:flex;gap:18px;padding:24px;flex-wrap:wrap}
  .kpi{flex:1;min-width:150px;border:1px solid var(--linea);border-radius:12px;padding:18px;text-align:center}
  .kpi b{display:block;font-size:34px;color:var(--azul-osc);line-height:1}
  .kpi span{font-size:12px;color:var(--gris)}
  .rep-foot{padding:14px 24px;border-top:1px solid var(--linea);font-size:11.5px;color:var(--gris);display:flex;justify-content:space-between}
  .nota{font-size:12px;color:var(--gris);background:#fbf6e9;border:1px solid #efe2bf;border-radius:10px;padding:10px 14px;margin-bottom:16px}

  @media print{
    body{background:#fff}
    header,nav,.no-print{display:none!important}
    main{padding:0;max-width:none}
    .vista{display:none!important}
    #vReporte{display:block!important}
    .card{box-shadow:none;border:1px solid #ccc}
    .rep-print-only{display:block!important}
  }
  .rep-print-only{display:none}

  /* ---------- v2: extras ---------- */
  .guardado-flash{font-size:11.5px;color:var(--verde);opacity:0;transition:opacity .2s;font-weight:600}
  .guardado-flash.on{opacity:1}
  .sem-sin{background:#94a3b0} .d-sin{background:#c2ccd4}
  .filtros{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .filtros .lbl{font-size:12px;color:var(--gris);font-weight:600}
  .fbtn{border:1px solid var(--linea);background:#fff;color:var(--gris);border-radius:20px;padding:5px 13px;font-size:12.5px;font-weight:600}
  .fbtn:hover{background:var(--sup2)}
  .fbtn.activo{background:var(--azul);color:#fff;border-color:var(--azul)}
  .obj-h{display:flex;align-items:center;gap:10px;margin:14px 0 10px 2px}
  .obj-pill{background:#eaf4fb;border:1px solid #cfe6f6;color:var(--azul);font-weight:700;font-size:12px;border-radius:7px;padding:3px 9px;white-space:nowrap}
  .obj-h .ot{font-size:13px;color:var(--gris);flex:1}
  .obj-h .opct{font-size:12.5px;font-weight:700;color:var(--gris)}
  .resp-sel{border:1px solid var(--linea);border-radius:7px;padding:3px 7px;font-family:var(--font);font-size:11.5px;background:#fff;color:var(--azul-osc);max-width:280px}
  .ind-input{width:74px;border:1px solid var(--linea);border-radius:7px;padding:5px 7px;text-align:right;font-family:var(--font);font-size:13px}
  /* expedientes */
  .exp-sum{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .exp-box{flex:1;min-width:130px;border-radius:12px;padding:14px 16px;color:#fff}
  .exp-box b{display:block;font-size:26px;line-height:1}.exp-box span{font-size:12px;opacity:.95}
  .e-terminado{background:var(--verde)} .e-enviado{background:var(--azul)} .e-detenido{background:var(--rojo)}
  .pill-est{font-size:11.5px;font-weight:600;border-radius:20px;padding:2px 10px;border:1px solid}
  .pe-terminado{color:#1c6b3f;background:#e7f5ec;border-color:#bfe3cc}
  .pe-enviado{color:#0c447c;background:#e6f1fb;border-color:#c4ddf5}
  .pe-detenido{color:#9a2e24;background:#fbeceb;border-color:#f2cdc9}
  .exp-form{display:grid;grid-template-columns:1fr 2fr 1fr 1fr 1fr auto;gap:8px;align-items:center;margin:12px 0;padding:14px;background:var(--sup2);border:1px solid var(--linea);border-radius:10px}
  .exp-form input,.exp-form select{border:1px solid var(--linea);border-radius:8px;padding:7px 9px;font-family:var(--font);font-size:12.5px;background:#fff}
  .exp-form button{border:none;background:var(--azul);color:#fff;border-radius:8px;padding:8px 12px;font-weight:600;font-size:12.5px}
  .est-sel{border:1px solid var(--linea);border-radius:7px;padding:3px 6px;font-family:var(--font);font-size:12px;background:#fff}
  @media(max-width:900px){.exp-form{grid-template-columns:1fr 1fr}}
  /* responsables admin */
  .ra-row{display:grid;grid-template-columns:2fr 1fr auto auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--linea)}
  .ra-row input{border:1px solid var(--linea);border-radius:8px;padding:6px 9px;font-family:var(--font);font-size:13px}
  .ra-row .cnt{font-size:12px;color:var(--gris)}
  .ra-del{border:none;background:none;color:#b9c4cd;font-size:18px;cursor:pointer}
  .ra-del:hover{color:var(--rojo)}
  .mini{font-size:12px;color:var(--gris)}
  .resp-grupo{padding:16px 18px;margin-bottom:12px}
  .resp-grupo .rg-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .resp-grupo .rg-nom{font-weight:700;color:var(--azul-osc);font-size:15px}
  .resp-grupo .rg-coord{font-size:12px;color:var(--gris)}
  .resp-grupo .rg-pct{margin-left:auto;font-weight:700;color:var(--azul-osc)}
  .resp-fichas{font-size:13px;color:var(--tinta)}
  .resp-fichas li{margin:3px 0}

  /* ---------- v3: miradas indicadores + reporte ejecutivo ---------- */
  .seg{display:inline-flex;background:var(--sup2);border:1px solid var(--linea);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px}
  .seg button{border:none;background:none;color:var(--gris);font-weight:600;font-size:13px;padding:7px 16px;border-radius:8px}
  .seg button:hover{color:var(--azul-osc)}
  .seg button.activo{background:#fff;color:var(--azul);box-shadow:var(--sombra)}
  .ibar{margin-bottom:14px}
  .ibar-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:5px;gap:10px}
  .ibar-top .nm{font-weight:600;color:var(--tinta)}
  .ibar-top .nm .tag{display:inline-block;background:#eaf4fb;border:1px solid #cfe6f6;color:var(--azul);border-radius:6px;font-size:11px;font-weight:700;padding:1px 7px;margin-right:8px}
  .ibar-top .vl{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ibar-track{height:13px;background:var(--sup2);border:1px solid var(--linea);border-radius:7px;overflow:hidden}
  .ibar-fill{height:100%;border-radius:6px;transition:width .5s ease}
  .ibar .sub{font-size:11.5px;color:var(--gris);margin-top:3px}
  .coord-inp{border:1px solid var(--linea);border-radius:6px;padding:3px 7px;font-family:var(--font);font-size:12px;width:130px}

  /* reporte ejecutivo */
  .rep-hero{background:var(--azul-osc);color:#fff;padding:26px 28px;display:flex;align-items:center;gap:30px;flex-wrap:wrap}
  .rep-hero .rh-donuts{display:flex;gap:26px}
  .rep-hero .rh-d{text-align:center}
  .rep-hero .rh-d .n{font-size:30px;font-weight:700;line-height:1;margin-top:-94px;margin-bottom:62px}
  .rep-hero .rh-d .l{font-size:11.5px;opacity:.85;max-width:120px;margin:0 auto}
  .rep-hero .rh-msg{flex:1;min-width:220px}
  .rep-hero .rh-msg h3{color:#fff;font-size:17px;margin-bottom:6px}
  .rep-hero .rh-msg p{font-size:13px;opacity:.9;margin:0;line-height:1.45}
  .rep-kpi2{display:flex;gap:14px;padding:20px 24px;flex-wrap:wrap;border-bottom:1px solid var(--linea)}
  .kpi2{flex:1;min-width:150px;border-radius:12px;padding:16px;background:var(--sup2);border:1px solid var(--linea)}
  .kpi2 b{display:block;font-size:30px;line-height:1;color:var(--azul-osc)}
  .kpi2 span{font-size:12px;color:var(--gris)}
  .rep-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .rep-cols > div{padding:18px 24px}
  .rep-cols > div:first-child{border-right:1px solid var(--linea)}
  @media(max-width:820px){.rep-cols{grid-template-columns:1fr}.rep-cols > div:first-child{border-right:none;border-bottom:1px solid var(--linea)}}
  .ejeblock{margin-bottom:14px}
  .ejeblock .eb-nm{font-size:12.5px;font-weight:600;color:var(--tinta);margin-bottom:6px}
  .ejeblock .eb-line{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .ejeblock .eb-line .lab{font-size:10.5px;color:var(--gris);width:64px;flex-shrink:0}
  .ejeblock .eb-line .tk{flex:1;height:9px;background:var(--sup2);border:1px solid var(--linea);border-radius:5px;overflow:hidden}
  .ejeblock .eb-line .fl{height:100%;border-radius:4px}
  .ejeblock .eb-line .pc{font-size:11px;font-weight:700;width:38px;text-align:right;font-variant-numeric:tabular-nums}
  .chips{display:flex;flex-direction:column;gap:7px}
  .chip{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:7px 11px;border-radius:9px;border:1px solid}
  .chip b{font-weight:700}
  .chip-ok{background:#e7f5ec;border-color:#bfe3cc;color:#1c6b3f}
  .chip-warn{background:#fbeceb;border-color:#f2cdc9;color:#9a2e24}
  .chip-empty{font-size:12px;color:var(--gris);font-style:italic}
  .rep-card-print{print-color-adjust:exact;-webkit-print-color-adjust:exact}

  /* ---------- v4: login, verificadores, gestión, toast ---------- */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--fondo);z-index:50;padding:20px}
  .login-card{background:#fff;border:1px solid var(--linea);border-top:4px solid var(--azul);border-radius:16px;box-shadow:var(--sombra);padding:32px;max-width:380px;width:100%;text-align:center}
  .login-card img{height:54px;margin-bottom:14px}
  .login-card h1{font-size:18px;margin-bottom:4px}
  .login-card p{color:var(--gris);font-size:13px;margin:0 0 20px}
  .login-card input{width:100%;border:1px solid var(--linea);border-radius:9px;padding:11px 12px;font-family:var(--font);font-size:14px;margin-bottom:10px}
  .login-card button{width:100%;background:var(--azul);color:#fff;border:none;border-radius:9px;padding:12px;font-weight:600;font-size:14px;cursor:pointer}
  .login-card button:hover{background:var(--azul-osc)}
  .login-card button:disabled{opacity:.6;cursor:default}
  .login-err{color:var(--rojo);font-size:12.5px;min-height:18px;margin-top:8px}
  .user-chip{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--gris)}
  .user-chip b{color:var(--azul-osc);font-weight:600}

  .verif{margin-top:12px;border-top:1px dashed var(--linea);padding-top:10px}
  .verif-h{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--celeste);margin-bottom:8px}
  .vrow{display:flex;align-items:center;gap:10px;padding:5px 4px;border-radius:7px}
  .vrow:hover{background:var(--sup2)}
  .vname{flex:1;color:var(--azul);cursor:pointer;font-size:13px;text-decoration:none}
  .vname:hover{text-decoration:underline}
  .vsize{font-size:11px;color:var(--gris);font-variant-numeric:tabular-nums}
  .vup{display:inline-block;margin-top:8px;border:1px dashed var(--azul);color:var(--azul);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .vup:hover{background:var(--sup2)}

  .chip-amber{background:#fbf3e3;border-color:#efe0bd;color:#8a6312}
  .prio{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--linea)}
  .prio-n{width:26px;height:26px;border-radius:50%;background:var(--azul);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .prio-b{flex:1}
  .prio-t{font-size:13px;color:var(--tinta)}
  .prio-s{font-weight:700;color:var(--azul-osc);font-variant-numeric:tabular-nums;font-size:14px}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#9a2e24;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:60;max-width:90%}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

</style>
</head>
<body>

<!-- Pantalla de inicio de sesión -->

// ---------- Conexión a Supabase ----------

const SUPABASE_URL = 'https://uqqrhgitsgbxuulkamnt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxcXJoZ2l0c2dieHV1bGthbW50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTk5MzgsImV4cCI6MjA5NzI5NTkzOH0.9qjpUzEJjNPKf4ayMeuuoO3l010QiYENXq6SDAVpOZ8';
let sb = null;

// Carga garantizada de la librería de Supabase (por si el <script> del CDN
// aún no terminó o fue bloqueado). Resuelve cuando window.supabase está listo.
function cargarSupabase(){
  return new Promise((resolve, reject)=>{
    if(window.supabase && window.supabase.createClient) return resolve();
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    s.onload=()=>{ (window.supabase && window.supabase.createClient) ? resolve() : reject(new Error('lib')); };
    s.onerror=()=>reject(new Error('cdn'));
    document.head.appendChild(s);
  });
}
async function conectarSupabase(){
  await cargarSupabase();
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

let estado = null;

// ---------- Sesión ----------
async function sesionActual(){ const { data } = await sb.auth.getSession(); return data.session; }
async function iniciarSesion(email, pass){ return await sb.auth.signInWithPassword({ email: email, password: pass }); }
async function cerrarSesion(){ await sb.auth.signOut(); }

// ---------- Carga del estado desde la nube ----------
async function loadEstado(){
  const [pg, fi, ac, pr, ind, vf] = await Promise.all([
    sb.from('programas').select('*').order('orden'),
    sb.from('fichas').select('*').order('orden'),
    sb.from('actividades').select('*').order('orden'),
    sb.from('progreso').select('*'),
    sb.from('indicadores').select('*'),
    sb.from('verificadores').select('*').order('creado')
  ]);
  const err = pg.error||fi.error||ac.error||pr.error||ind.error||vf.error;
  if(err) throw err;

  estado = { programas:{}, fichas:[], progreso:{}, indicadores:{}, verificadores: vf.data||[], periodo:{ anio:2026, sem:1 } };

  (pg.data||[]).forEach(p=>{ estado.programas[p.id]={ id:p.id, nombre:p.nombre, coord:p.coord||'', presupuesto:Number(p.presupuesto)||0, orden:p.orden }; });

  const actPorFicha={}, actAFicha={};
  (ac.data||[]).forEach(a=>{
    (actPorFicha[a.ficha_id]=actPorFicha[a.ficha_id]||[]).push({ id:a.id, desc:a.descripcion });
    actAFicha[a.id]=a.ficha_id;
  });
  estado.fichas=(fi.data||[]).map(f=>({
    id:f.id, eje:f.eje, obj:f.obj, prog:f.prog, linea:f.linea, ind:f.indicador||'',
    meta:f.meta||'', plazo:f.plazo||'', pond:Number(f.pond)||0, pladeco:!!f.pladeco,
    actividades: actPorFicha[f.id]||[]
  }));
  (pr.data||[]).forEach(r=>{
    const fid=actAFicha[r.actividad_id]; if(!fid) return;
    (estado.progreso[r.periodo]=estado.progreso[r.periodo]||{});
    (estado.progreso[r.periodo][fid]=estado.progreso[r.periodo][fid]||[]).push(r.actividad_id);
  });
  (ind.data||[]).forEach(r=>{
    (estado.indicadores[r.periodo]=estado.indicadores[r.periodo]||{});
    estado.indicadores[r.periodo][r.ficha_id]=r.pct;
  });
}

}
async function dbToggleActividad(periodo, actId, hecha){
  if(hecha){ const r=await sb.from('progreso').upsert({ periodo:periodo, actividad_id:actId }); if(r.error) throw r.error; }
  else { const r=await sb.from('progreso').delete().match({ periodo:periodo, actividad_id:actId }); if(r.error) throw r.error; }
}
async function dbSetIndicador(periodo, fichaId, pct){
  if(pct==null){ const r=await sb.from('indicadores').delete().match({ periodo:periodo, ficha_id:fichaId }); if(r.error) throw r.error; }
  else { const r=await sb.from('indicadores').upsert({ periodo:periodo, ficha_id:fichaId, pct:pct }); if(r.error) throw r.error; }
}
async function dbAddActividad(fichaId, id, desc, orden){
  const r=await sb.from('actividades').insert({ id:id, ficha_id:fichaId, descripcion:desc, orden:orden }); if(r.error) throw r.error;
}
async function dbDelActividad(id){ const r=await sb.from('actividades').delete().eq('id', id); if(r.error) throw r.error; }
async function dbSetFichaProg(fichaId, prog){ const r=await sb.from('fichas').update({ prog:prog }).eq('id', fichaId); if(r.error) throw r.error; }
async function dbUpdPrograma(id, patch){ const r=await sb.from('programas').update(patch).eq('id', id); if(r.error) throw r.error; }
async function dbAddPrograma(p){ const r=await sb.from('programas').insert(p); if(r.error) throw r.error; }
async function dbUploadVerif(file, fichaId, periodo){
  const limpio = file.name.replace(/[^\w.\-]+/g,'_');
  const ruta = fichaId+'/'+periodo+'/'+Date.now()+'_'+limpio;
  const up = await sb.storage.from('verificadores').upload(ruta, file);
  if(up.error) throw up.error;
  const ins = await sb.from('verificadores').insert({ ficha_id:fichaId, periodo:periodo, nombre:file.name, ruta:ruta, tamano:file.size }).select().single();
  if(ins.error) throw ins.error;
  return ins.data;
}
async function dbAbrirVerif(ruta){
  const { data, error } = await sb.storage.from('verificadores').createSignedUrl(ruta, 120);
  if(error) throw error; window.open(data.signedUrl, '_blank');
}
async function dbDelVerif(id, ruta){
  const rm = await sb.storage.from('verificadores').remove([ruta]); if(rm.error) throw rm.error;
  const r = await sb.from('verificadores').delete().eq('id', id); if(r.error) throw r.error;
}

function guardarEstado(silencioso){ if(!silencioso && typeof flashGuardado==='function') flashGuardado(); }


function clavePeriodo() { return estado.periodo.anio + '-' + estado.periodo.sem; }
function setHechas(id, arr){ const k=clavePeriodo(); if(!estado.progreso[k]) estado.progreso[k]={}; estado.progreso[k][id]=arr; }
function getHechas(id){ const k=clavePeriodo(); return (estado.progreso[k] && estado.progreso[k][id]) ? estado.progreso[k][id] : []; }
function setIndicador(id, v){ const k=clavePeriodo(); if(!estado.indicadores[k]) estado.indicadores[k]={}; estado.indicadores[k][id]=v; }
function getIndicador(id){ const k=clavePeriodo(); const o=estado.indicadores[k]; return (o && o[id]!=null) ? o[id] : null; }

// ---------- Cálculos ----------
function pctFicha(f){
  const t=f.actividades.length; if(t===0) return 0;
  const h=getHechas(f.id).filter(id=>f.actividades.some(a=>a.id===id));
  return Math.round((h.length/t)*100);
}
// Estado operativo (avance de actividades): incluye "sin iniciar"
function estadoOp(f){
  const p=pctFicha(f);
  if(p===0) return 'sin';
  if(p<40) return 'bajo';
  if(p<70) return 'medio';
  return 'alto';
}
// Estado del indicador (cumplimiento de meta): cortes oficiales del Control de Gestión
function estadoInd(pct){
  if(pct==null) return 'sin';
  if(pct>=70) return 'alto';
  if(pct>=40) return 'medio';
  return 'bajo';
}
function pctGlobal(){
  let sp=0,sw=0; estado.fichas.forEach(f=>{ sp+=pctFicha(f)*f.pond; sw+=f.pond; });
  return sw>0?Math.round(sp/sw):0;
}
function promFichas(fs){ return fs.length?Math.round(fs.reduce((s,f)=>s+pctFicha(f),0)/fs.length):0; }
function pctPorEje(){ const o={}; for(let e=1;e<=6;e++) o[e]=promFichas(estado.fichas.filter(f=>f.eje===e)); return o; }
function pctPorObjetivo(){ const o={}; Object.keys(OBJETIVOS).forEach(k=>o[k]=promFichas(estado.fichas.filter(f=>f.obj===k))); return o; }
function pctPorPrograma(){ const o={}; Object.keys(estado.programas).forEach(p=>o[p]=promFichas(estado.fichas.filter(f=>f.prog===p))); return o; }
function conteoOp(){ const c={sin:0,bajo:0,medio:0,alto:0}; estado.fichas.forEach(f=>c[estadoOp(f)]++); return c; }
function conteoInd(){ const c={sin:0,bajo:0,medio:0,alto:0}; estado.fichas.forEach(f=>c[estadoInd(getIndicador(f.id))]++); return c; }
function promIndicador(){
  const vals=estado.fichas.map(f=>getIndicador(f.id)).filter(v=>v!=null);
  return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
}
// Cumplimiento del indicador agregado por grupo (promedio de las fichas con valor; null si ninguna)
function promIndGrupo(fs){
  const vals=fs.map(f=>getIndicador(f.id)).filter(v=>v!=null);
  return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
}
function indPorObjetivo(){ const o={}; Object.keys(OBJETIVOS).forEach(k=>o[k]=promIndGrupo(estado.fichas.filter(f=>f.obj===k))); return o; }
function indPorEje(){ const o={}; for(let e=1;e<=6;e++) o[e]=promIndGrupo(estado.fichas.filter(f=>f.eje===e)); return o; }
function indPorPrograma(){ const o={}; Object.keys(estado.programas).forEach(p=>o[p]=promIndGrupo(estado.fichas.filter(f=>f.prog===p))); return o; }
function objetivosEnMeta(){ const io=indPorObjetivo(); return Object.keys(io).filter(k=>io[k]!=null&&io[k]>=70).length; }
function objetivosConDato(){ const io=indPorObjetivo(); return Object.keys(io).filter(k=>io[k]!=null).length; }

const fmtCLP = n => '$' + (Number(n)||0).toLocaleString('es-CL');
const ESTADOS_EXP = { terminado:'Terminado', enviado:'Enviado', detenido:'Detenido' };

function colorEstado(s){
  return s==='alto' ? 'var(--verde)' : s==='medio' ? 'var(--ambar)' : s==='bajo' ? 'var(--rojo)' : '#94a3b0';
}
function colorPct(pct){
  if(pct===0) return '#94a3b0';
  if(pct<40) return 'var(--rojo)';
  if(pct<70) return 'var(--ambar)';
  return 'var(--verde)';
}
function escapeHTML(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fechaLegible(iso){
  if(!iso) return 'sin registros aún';
  const d=new Date(iso);
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'long',year:'numeric'})+' · '+d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
}
let flashTimer=null;
function flashGuardado(){
  const el=document.getElementById('guardadoFlash'); if(!el) return;
  el.classList.add('on'); clearTimeout(flashTimer);
  flashTimer=setTimeout(()=>el.classList.remove('on'),1400);
  sincronizarActualizado();
}
function sincronizarActualizado(){
  const el=document.getElementById('actualizado');
  if(el) el.textContent='Última actualización: '+fechaLegible(estado.actualizado);
}
function donutSVG(pct,size,color,track){
  const r=52,c=2*Math.PI*r,off=c*(1-pct/100);
  const tk=track||'var(--sup2)';
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 130 130">'+
    '<circle cx="65" cy="65" r="'+r+'" fill="none" stroke="'+tk+'" stroke-width="14"/>'+
    '<circle cx="65" cy="65" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="14" stroke-linecap="round" '+
    'stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 65 65)"/></svg>';
}
function barItem(nombre,pct){
  return '<div class="bar-item"><div class="bar-top"><span class="nm">'+nombre+'</span>'+
    '<span class="vl">'+pct+'%</span></div><div class="bar-track">'+
    '<div class="bar-fill" style="width:'+pct+'%;background:'+colorPct(pct)+'"></div></div></div>';
}

/* ---------- PANEL GENERAL ---------- */
function renderPanel(){
  const g=pctGlobal(), c=conteoOp(), pe=pctPorEje(), pp=pctPorPrograma();
  let barsEje=''; for(let e=1;e<=6;e++) barsEje+=barItem('E.E.'+e+' · '+EJES[e],pe[e]);
  let barsProg=''; Object.keys(estado.programas).forEach(p=>{
    const nf=estado.fichas.filter(f=>f.prog===p).length;
    if(nf>0) barsProg+=barItem(estado.programas[p].nombre+' ('+nf+')',pp[p]);
  });
  let pres='',tot=0; Object.keys(estado.programas).forEach(p=>{
    const v=estado.programas[p].presupuesto||0; tot+=v;
    pres+='<tr><td>'+escapeHTML(estado.programas[p].nombre)+'</td>'+
      '<td class="num"><input class="pres-input" data-prog="'+p+'" value="'+(v?fmtCLP(v):'')+'" placeholder="$0"></td></tr>';
  });
  document.getElementById('vPanel').innerHTML=
    '<div class="grid g-hero"><div class="card hero">'+
      donutSVG(g,180,colorPct(g))+
      '<div style="margin-top:-118px;margin-bottom:78px"><div class="donut-num">'+g+'%</div><div class="donut-lbl">cumplimiento</div></div>'+
      '<h3>Avance global del PLADETUR</h3>'+
      '<div class="sem-row">'+

/* ---------- REGISTRO POR FICHA ---------- */
let ejesCerrados={}, filtroPlazo='Todos';
function opcionesResponsable(sel){
  let o=''; Object.keys(estado.programas).forEach(p=>{
    o+='<option value="'+p+'"'+(p===sel?' selected':'')+'>'+escapeHTML(estado.programas[p].nombre)+'</option>';
  });
  o+='<option value="__add__">+ Agregar responsable…</option>';
  return o;
}
function renderRegistro(){
  const pe=pctPorEje(), po=pctPorObjetivo();
  const plazos=['Todos','Corto','Mediano','Largo'];
  let html='<p class="nota">Marca las actividades realizadas en tu reunión semanal: el avance de la ficha, del objetivo, del eje y el total se recalculan solos.</p>';
  html+='<div class="filtros"><span class="lbl">Filtrar por plazo:</span>';
  plazos.forEach(p=>{ html+='<button class="fbtn'+(filtroPlazo===p?' activo':'')+'" data-plazo="'+p+'">'+p+'</button>'; });
  html+='</div>';
  for(let e=1;e<=6;e++){
    const fichasEje=estado.fichas.filter(f=>f.eje===e && (filtroPlazo==='Todos'||f.plazo===filtroPlazo));
    if(fichasEje.length===0) continue;
    const cerr=ejesCerrados[e]?' cerrado':'', ocu=ejesCerrados[e]?' oculto':'';
    html+='<div class="eje-h'+cerr+'" data-eje="'+e+'"><span class="eje-pill">E.E.'+e+'</span>'+
      '<h2>'+EJES[e]+'</h2><span class="eje-pct">'+pe[e]+'%</span><span class="eje-chev">▾</span></div>'+
      '<div class="eje-body'+ocu+'" data-eje-body="'+e+'">';
    Object.keys(OBJETIVOS).filter(k=>OBJETIVOS[k].eje===e).forEach(ok=>{
      const fichasObj=fichasEje.filter(f=>f.obj===ok);
      if(fichasObj.length===0) return;
      html+='<div class="obj-h"><span class="obj-pill">'+ok+'</span>'+
        '<span class="ot">'+escapeHTML(OBJETIVOS[ok].texto)+'</span><span class="opct">'+po[ok]+'%</span></div>';
      fichasObj.forEach(f=>html+=fichaCard(f));
    });
    html+='</div>';
  }
  document.getElementById('vRegistro').innerHTML=html;
  document.querySelectorAll('#vRegistro [data-plazo]').forEach(b=>b.addEventListener('click',()=>{ filtroPlazo=b.dataset.plazo; renderRegistro(); }));
  document.querySelectorAll('#vRegistro .eje-h').forEach(h=>h.addEventListener('click',()=>{
    const e=h.dataset.eje; ejesCerrados[e]=!ejesCerrados[e];
    h.classList.toggle('cerrado'); document.querySelector('[data-eje-body="'+e+'"]').classList.toggle('oculto');
  }));
  enlazarEventosFicha();
}
function fichaCard(f){
  const pct=pctFicha(f), est=estadoOp(f), hechas=getHechas(f.id);
  let acts='';
  f.actividades.forEach(a=>{
    const done=hechas.indexOf(a.id)!==-1;
    acts+='<div class="'+(done?'act done':'act')+'"><input type="checkbox" data-ficha="'+f.id+'" data-act="'+a.id+'"'+(done?' checked':'')+'>'+
      '<label>'+escapeHTML(a.desc)+'</label>'+
      '<button class="del" data-del-ficha="'+f.id+'" data-del-act="'+a.id+'" title="Quitar">×</button></div>';
  });
  const pl=f.pladeco?'<span class="badge badge-pl">Vinculada a PLADECO</span>':'';
  const periodo=clavePeriodo();
  const vs=estado.verificadores.filter(v=>v.ficha_id===f.id && v.periodo===periodo);
  let vlist=vs.map(v=>'<div class="vrow"><a class="vname" data-open-ruta="'+escapeHTML(v.ruta)+'" title="Abrir">📄 '+escapeHTML(v.nombre)+'</a>'+
    '<span class="vsize">'+fmtTam(v.tamano)+'</span>'+
    '<button class="del" data-del-verif="'+v.id+'" data-del-ruta="'+escapeHTML(v.ruta)+'" title="Eliminar">×</button></div>').join('');
  if(!vs.length) vlist='<div class="mini" style="padding:3px 0">Sin verificadores en este período.</div>';
  const verifBlock='<div class="verif"><div class="verif-h">Verificadores de respaldo</div>'+vlist+
    '<label class="vup">📎 Adjuntar archivo (PDF, planilla…)<input type="file" data-up-ficha="'+f.id+'" style="display:none"></label></div>';
  return '<div class="card ficha" data-card="'+f.id+'"><div class="ficha-top">'+
    '<span class="dot d-'+est+'"></span><div style="flex:1">'+
      '<span class="ficha-id">'+f.id+'</span><div class="ficha-linea">'+escapeHTML(f.linea)+'</div>'+
      '<div class="ficha-meta">'+
        '<span>Responsable: <select class="resp-sel" data-resp="'+f.id+'">'+opcionesResponsable(f.prog)+'</select></span>'+
        '<span>Indicador: '+escapeHTML(f.ind)+'</span><span>Meta: '+escapeHTML(f.meta)+'</span>'+
        '<span>Plazo: '+f.plazo+'</span>'+pl+'</div></div>'+
    '<div class="ficha-pct"><b data-pct="'+f.id+'">'+pct+'%</b><span>avance</span></div></div>'+
    '<div class="acts">'+acts+
      '<div class="add-act"><input type="text" placeholder="Agregar actividad…" data-add-input="'+f.id+'">'+
      '<button data-add-btn="'+f.id+'">+ Agregar</button></div></div>'+
    verifBlock+'</div>';
}
function fmtTam(b){ b=Number(b)||0; if(b<1024) return b+' B'; if(b<1048576) return Math.round(b/1024)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function enlazarEventosFicha(){
  document.querySelectorAll('#vRegistro input[type=checkbox]').forEach(cb=>cb.addEventListener('change',()=>{
    const fid=cb.dataset.ficha,aid=cb.dataset.act; let arr=getHechas(fid).slice(); const i=arr.indexOf(aid);
    if(cb.checked){ if(i===-1) arr.push(aid); } else if(i!==-1) arr.splice(i,1);
    setHechas(fid,arr); persist(()=>dbToggleActividad(clavePeriodo(),aid,cb.checked)); refrescarFicha(fid);
  }));
  document.querySelectorAll('#vRegistro .del[data-del-act]').forEach(btn=>btn.addEventListener('click',()=>{
    const fid=btn.dataset.delFicha,aid=btn.dataset.delAct; const f=estado.fichas.find(x=>x.id===fid);
    if(f.actividades.length<=1){ alert('La ficha debe tener al menos una actividad.'); return; }
    f.actividades=f.actividades.filter(a=>a.id!==aid);
    Object.keys(estado.progreso).forEach(k=>{ if(estado.progreso[k][fid]) estado.progreso[k][fid]=estado.progreso[k][fid].filter(x=>x!==aid); });
    persist(()=>dbDelActividad(aid)); renderRegistro();
  }));
  document.querySelectorAll('#vRegistro [data-add-btn]').forEach(btn=>btn.addEventListener('click',()=>{
    const fid=btn.dataset.addBtn, inp=document.querySelector('[data-add-input="'+fid+'"]'), txt=inp.value.trim();
    if(!txt) return; const f=estado.fichas.find(x=>x.id===fid);
    const nid=fid+'_a'+Date.now().toString(36), orden=f.actividades.length+1;
    f.actividades.push({id:nid,desc:txt}); persist(()=>dbAddActividad(fid,nid,txt,orden)); renderRegistro();
  }));
  document.querySelectorAll('#vRegistro [data-add-input]').forEach(inp=>inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); document.querySelector('[data-add-btn="'+inp.dataset.addInput+'"]').click(); }
  }));
  document.querySelectorAll('#vRegistro .resp-sel').forEach(sel=>sel.addEventListener('change',()=>{
    const fid=sel.dataset.resp, f=estado.fichas.find(x=>x.id===fid);
    if(sel.value==='__add__'){
      const nombre=prompt('Nombre del nuevo responsable / programa:');
      if(nombre && nombre.trim()){
        const pid='p'+Date.now().toString(36);
        const coord=(prompt('Coordinador/a a cargo (opcional):')||'').trim();
        const orden=Object.keys(estado.programas).length+1;
        estado.programas[pid]={id:pid,nombre:nombre.trim(),coord:coord,presupuesto:0,orden:orden};
        f.prog=pid;
        persist(async()=>{ await dbAddPrograma({id:pid,nombre:nombre.trim(),coord:coord,presupuesto:0,orden:orden}); await dbSetFichaProg(fid,pid); });
      }
      renderRegistro(); return;
    }
    f.prog=sel.value; persist(()=>dbSetFichaProg(fid,sel.value));
  }));
  // abrir verificador
  document.querySelectorAll('#vRegistro [data-open-ruta]').forEach(a=>a.addEventListener('click',async()=>{
    try{ await dbAbrirVerif(a.dataset.openRuta); }catch(e){ avisoError('No se pudo abrir el archivo.'); }
  }));
  // eliminar verificador
  document.querySelectorAll('#vRegistro .del[data-del-verif]').forEach(btn=>btn.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar este verificador?')) return;
    const id=Number(btn.dataset.delVerif), ruta=btn.dataset.delRuta;
    try{ await dbDelVerif(id,ruta); estado.verificadores=estado.verificadores.filter(v=>v.id!==id); flashGuardado(); renderRegistro(); }
    catch(e){ avisoError('No se pudo eliminar el archivo.'); }
  }));
  // subir verificador
  document.querySelectorAll('#vRegistro [data-up-ficha]').forEach(inp=>inp.addEventListener('change',async()=>{
    const file=inp.files[0]; if(!file) return;
    if(file.size>26214400){ avisoError('El archivo supera los 25 MB.'); inp.value=''; return; }
    try{ const row=await dbUploadVerif(file,inp.dataset.upFicha,clavePeriodo()); estado.verificadores.push(row); flashGuardado(); renderRegistro(); }
    catch(e){ avisoError('No se pudo subir el archivo. Revisa tu conexión.'); }
    inp.value='';
  }));
}
function refrescarFicha(fid){
  const f=estado.fichas.find(x=>x.id===fid), pct=pctFicha(f), est=estadoOp(f);
  const card=document.querySelector('[data-card="'+fid+'"]');
  if(card){
    card.querySelector('[data-pct="'+fid+'"]').textContent=pct+'%';
    const dot=card.querySelector('.dot'); dot.classList.remove('d-sin','d-bajo','d-medio','d-alto'); dot.classList.add('d-'+est);
    card.querySelectorAll('.act').forEach(a=>{ const cb=a.querySelector('input'); a.classList.remove('done'); if(cb.checked) a.classList.add('done'); });
  }
  const pe=pctPorEje(), po=pctPorObjetivo();
  const eh=document.querySelector('.eje-h[data-eje="'+f.eje+'"] .eje-pct'); if(eh) eh.textContent=pe[f.eje]+'%';
  document.querySelectorAll('.obj-h').forEach(h=>{ const k=h.querySelector('.obj-pill').textContent; if(po[k]!=null) h.querySelector('.opct').textContent=po[k]+'%'; });
}

/* ---------- REPORTE AL ALCALDE (ejecutivo) ---------- */
function ejeBlock(nombre, etiqueta, avance, meta){
  function linea(lab,pct){
    const has=pct!=null, col=has?colorPct(has?pct:0):'#cbd5dd';
    const c2=has?(pct===0?'#94a3b0':col):'#cbd5dd';
    return '<div class="eb-line"><span class="lab">'+lab+'</span>'+
      '<span class="tk"><span class="fl" style="width:'+(has?pct:0)+'%;background:'+c2+'"></span></span>'+
      '<span class="pc" style="color:'+(has?'var(--azul-osc)':'var(--gris)')+'">'+(has?pct+'%':'—')+'</span></div>';
  }
  return '<div class="ejeblock"><div class="eb-nm">'+etiqueta+' · '+escapeHTML(nombre)+'</div>'+
    linea('Actividades', avance)+linea('Metas', meta)+'</div>';
}
function renderReporte(){
  const g=pctGlobal(), prom=promIndicador(), cOp=conteoOp();
  const io=indPorObjetivo(), ie=indPorEje(), pe=pctPorEje();
  const enMeta=objetivosEnMeta(), conDato=objetivosConDato();
  const sem=(estado.periodo.sem===1?'Primer':'Segundo')+' semestre '+estado.periodo.anio;

  // cumplimiento por objetivo (centro del reporte)
  let barsObj='';
  for(let e=1;e<=6;e++){
    Object.keys(OBJETIVOS).filter(k=>OBJETIVOS[k].eje===e).forEach(ok=>{
      const pct=io[ok], has=pct!=null, col=has?colorEstado(estadoInd(pct)):'#cbd5dd';
      barsObj+='<div class="ibar"><div class="ibar-top"><span class="nm"><span class="tag">'+ok+'</span>'+escapeHTML(OBJETIVOS[ok].texto.slice(0,54))+(OBJETIVOS[ok].texto.length>54?'…':'')+'</span>'+
        '<span class="vl" style="color:'+(has?col:'var(--gris)')+'">'+(has?pct+'%':'s/r')+'</span></div>'+
        '<div class="ibar-track"><div class="ibar-fill" style="width:'+(has?pct:0)+'%;background:'+col+'"></div></div></div>';
    });
  }
  // avance vs meta por eje
  let blocksEje='';
  for(let e=1;e<=6;e++) blocksEje+=ejeBlock(EJES[e],'E.E.'+e,pe[e],ie[e]);

  // focos y fortalezas (por objetivo)
  let fort='', foco='';
  Object.keys(OBJETIVOS).forEach(k=>{
    const v=io[k];
    if(v!=null && v>=70) fort+='<div class="chip chip-ok"><b>'+k+'</b> '+escapeHTML(OBJETIVOS[k].texto.slice(0,46))+(OBJETIVOS[k].texto.length>46?'…':'')+' · '+v+'%</div>';
    if(v!=null && v<40) foco+='<div class="chip chip-warn"><b>'+k+'</b> '+escapeHTML(OBJETIVOS[k].texto.slice(0,46))+(OBJETIVOS[k].texto.length>46?'…':'')+' · '+v+'%</div>';
  });
  if(!fort) fort='<div class="chip-empty">Aún no hay objetivos en nivel alto registrados.</div>';
  if(!foco) foco='<div class="chip-empty">Sin objetivos en nivel crítico.</div>';

  // detalle por línea
  let filas='';
  estado.fichas.forEach(f=>{
    const pct=pctFicha(f), ind=getIndicador(f.id);
    filas+='<tr><td>'+f.id+'</td><td>'+escapeHTML(f.linea)+'</td><td>'+escapeHTML(estado.programas[f.prog]?estado.programas[f.prog].nombre:'—')+'</td>'+
      '<td class="num"><span class="dot d-'+estadoOp(f)+'" style="display:inline-block;vertical-align:middle;margin-right:5px"></span>'+pct+'%</td>'+
      '<td class="num">'+(ind!=null?ind+'%':'<span class="mini">—</span>')+'</td></tr>';
  });

  const tkW='rgba(255,255,255,.18)';

/* ---------- GESTIÓN INTERNA (analítica por reglas) ---------- */
function pesoPlazo(p){ return p==='Corto'?1.6 : p==='Mediano'?1.3 : 1.0; }
function renderGestion(){
  const fichas=estado.fichas;
  // Priorización: score = atraso (100-avance) × ponderación × urgencia de plazo
  const ranked=fichas.map(f=>{
    const av=pctFicha(f); const score=Math.round((100-av)*(f.pond||0.17)*pesoPlazo(f.plazo)*10)/10;
    return {f, av, score};
  }).sort((a,b)=>b.score-a.score);

  // Alertas por reglas
  const alertas=[];
  fichas.forEach(f=>{
    const av=pctFicha(f), cum=getIndicador(f.id), prog=estado.programas[f.prog];
    const nomP=prog?prog.nombre:'—';
    if((f.pond||0)>=0.25 && av<40)
      alertas.push({sev:'alta', t:'<b>'+f.id+'</b> es de alta ponderación y va en '+av+'% de actividades — '+escapeHTML(f.linea.slice(0,46))});
    if(cum!=null && cum<40)
      alertas.push({sev:'alta', t:'<b>'+f.id+'</b> tiene cumplimiento de meta bajo ('+cum+'%) — '+escapeHTML(nomP)});
    if(av===0 && f.plazo==='Mediano')
      alertas.push({sev:'media', t:'<b>'+f.id+'</b> sin iniciar y es de plazo mediano — conviene activarla'});
  });
  // responsable con varias fichas en rojo/sin iniciar
  Object.keys(estado.programas).forEach(p=>{
    const fs=fichas.filter(x=>x.prog===p); if(!fs.length) return;
    const enRojo=fs.filter(x=>{const e=estadoOp(x); return e==='bajo'||e==='sin';}).length;
    if(enRojo>=3) alertas.push({sev:'media', t:'<b>'+escapeHTML(estado.programas[p].nombre)+'</b> tiene '+enRojo+' fichas sin iniciar o atrasadas — revisar carga'});
  });
  alertas.sort((a,b)=> (a.sev==='alta'?0:1)-(b.sev==='alta'?0:1));

  // Brechas por objetivo: 100 - cumplimiento de meta
  const io=indPorObjetivo();
  const brechas=Object.keys(OBJETIVOS).map(k=>({k, cum:io[k], brecha: io[k]==null?null:100-io[k]}))
    .filter(x=>x.brecha!=null).sort((a,b)=>b.brecha-a.brecha);

  // Carga por responsable
  let cargaRows='';
  Object.keys(estado.programas).forEach(p=>{
    const fs=fichas.filter(x=>x.prog===p); if(!fs.length) return;
    const prom=fs.length?Math.round(fs.reduce((s,x)=>s+pctFicha(x),0)/fs.length):0;
    const rojos=fs.filter(x=>{const e=estadoOp(x); return e==='bajo'||e==='sin';}).length;
    cargaRows+='<tr><td>'+escapeHTML(estado.programas[p].nombre)+'</td>'+
      '<td>'+escapeHTML(estado.programas[p].coord||'—')+'</td>'+
      '<td class="num">'+fs.length+'</td>'+
      '<td class="num"><span class="dot d-'+(prom===0?'sin':prom<40?'bajo':prom<70?'medio':'alto')+'" style="display:inline-block;vertical-align:middle;margin-right:5px"></span>'+prom+'%</td>'+
      '<td class="num">'+rojos+'</td></tr>';
  });

  let alertasHTML = alertas.length ? alertas.slice(0,12).map(a=>
    '<div class="chip '+(a.sev==='alta'?'chip-warn':'chip-amber')+'"><b>'+(a.sev==='alta'?'Alta':'Media')+'</b> '+a.t+'</div>').join('')
    : '<div class="chip-empty">Sin alertas por ahora. A medida que cargues avances y metas, aquí aparecen los focos.</div>';

  let prioHTML = ranked.slice(0,8).map((r,i)=>
    '<div class="prio"><span class="prio-n">'+(i+1)+'</span><div class="prio-b"><div class="prio-t"><b>'+r.f.id+'</b> '+escapeHTML(r.f.linea.slice(0,60))+'</div>'+
    '<div class="mini">'+(estado.programas[r.f.prog]?escapeHTML(estado.programas[r.f.prog].nombre):'—')+' · plazo '+r.f.plazo+' · avance '+r.av+'%</div></div>'+
    '<span class="prio-s">'+r.score+'</span></div>').join('');

  let brechasHTML = brechas.length ? brechas.slice(0,8).map(b=>ibar('Objetivo '+b.k, b.cum, 'Brecha de '+b.brecha+' puntos hasta la meta', b.k)).join('')
    : '<div class="chip-empty">Registra el cumplimiento de metas en la pestaña Indicadores para ver las brechas.</div>';

  document.getElementById('vGestion').innerHTML=
    '<p class="nota">Lecturas de gestión calculadas con tus datos del período. Te ayudan a decidir dónde poner el foco. <b>Las tendencias y proyecciones se activan cuando haya al menos dos períodos cargados</b> (vas en '+clavePeriodo().replace('-','-S')+').</p>'+
    '<div class="grid g-2">'+
      '<div class="card" style="padding:20px 22px"><div class="sec-tit">Alertas</div>'+alertasHTML+'</div>'+
      '<div class="card" style="padding:20px 22px"><div class="sec-tit">Prioridades sugeridas</div>'+
        '<p class="mini" style="margin:-6px 0 10px">Orden por atraso, ponderación de la ficha y urgencia del plazo.</p>'+prioHTML+'</div>'+
    '</div>'+
    '<div class="grid g-2" style="margin-top:18px">'+
      '<div class="card" style="padding:20px 22px"><div class="sec-tit">Brechas de cumplimiento por objetivo</div>'+brechasHTML+'</div>'+
      '<div class="card" style="padding:18px 20px"><div class="sec-tit">Carga de trabajo por responsable</div>'+
        '<table><thead><tr><th>Responsable</th><th>Coordinador/a</th><th class="num">Fichas</th><th class="num">Avance</th><th class="num">Atrasadas</th></tr></thead>'+
        '<tbody>'+cargaRows+'</tbody></table></div>'+
    '</div>';
}

/* ---------- Navegación / sesión / init ---------- */
function mostrarVista(id){
  document.querySelectorAll('.vista').forEach(v=>v.classList.remove('activa'));
  document.getElementById(id).classList.add('activa');
  document.querySelectorAll('.tab').forEach(t=>{ t.classList.remove('activo'); if(t.dataset.v===id) t.classList.add('activo'); });
  ({vPanel:renderPanel,vRegistro:renderRegistro,vIndicadores:renderIndicadores,vGestion:renderGestion,vReporte:renderReporte}[id])();
}
function iniciarSelectores(){
  const sa=document.getElementById('selAnio'); sa.innerHTML='';
  for(let y=2025;y<=2030;y++) sa.innerHTML+='<option value="'+y+'">'+y+'</option>';
  sa.value=estado.periodo.anio; document.getElementById('selSem').value=estado.periodo.sem;
}
// Aviso de error no técnico (toast)
let toastTimer=null;
function avisoError(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('on'); clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('on'),4000);
}

// ---- Arranque con sesión ----
async function arrancarApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='';
  try{ await loadEstado(); }
  catch(e){ console.error(e); avisoError('No se pudieron cargar los datos. Revisa la conexión o la configuración.'); return; }
  iniciarSelectores(); sincronizarActualizado(); renderPanel();
}
function mostrarLogin(){
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}
async function init(){
  // 1) El login se muestra SIEMPRE de entrada (aunque algo más falle).
  mostrarLogin();

  // 2) Enlazar botones primero, para que "Ingresar" responda pase lo que pase.
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>mostrarVista(t.dataset.v)));
  document.getElementById('selAnio').addEventListener('change',e=>{ estado.periodo.anio=parseInt(e.target.value,10); mostrarVista(document.querySelector('.vista.activa').id); });
  document.getElementById('selSem').addEventListener('change',e=>{ estado.periodo.sem=parseInt(e.target.value,10); mostrarVista(document.querySelector('.vista.activa').id); });
  document.getElementById('btnLogout').addEventListener('click',async()=>{ try{ await cerrarSesion(); }catch(e){} estado=null; mostrarLogin(); });

  const errEl=document.getElementById('loginErr');
  const doLogin=async()=>{
    const email=document.getElementById('loginEmail').value.trim();
    const pass=document.getElementById('loginPass').value;
    errEl.textContent='';
    const btn=document.getElementById('btnLogin'); btn.disabled=true; btn.textContent='Ingresando…';
    try{
      if(!sb){ await conectarSupabase(); }
      const { error }=await iniciarSesion(email,pass);
      if(error){ errEl.textContent='No pudimos iniciar sesión. Revisa tu correo y contraseña.'; return; }
      document.getElementById('userEmail').textContent=email;
      await arrancarApp();
    }catch(e){
      console.error(e);
      errEl.textContent='No se pudo conectar. Revisa tu internet y recarga la página.';
    }finally{
      btn.disabled=false; btn.textContent='Ingresar';
    }
  };
  document.getElementById('btnLogin').addEventListener('click',doLogin);
  document.getElementById('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

  // 3) Conectar a Supabase (esperando a que la librería esté lista) y revisar sesión.
  try{
    await conectarSupabase();
    const ses=await sesionActual();
    if(ses){ document.getElementById('userEmail').textContent=(ses.user&&ses.user.email)||''; await arrancarApp(); }
  }catch(e){
    console.error(e);
    errEl.textContent='No se pudo cargar la conexión. Revisa tu internet y recarga la página.';
  }
}
// Arrancar cuando el DOM esté listo (sin depender del orden de carga del CDN).
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
else init();

</script>
